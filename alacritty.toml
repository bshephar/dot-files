import = ["~/.config/alacritty/themes/themes/tokyo-night.toml"]

#[colors.bright]
#black = "#424242"
#blue = "#3E7FEE"
#cyan = "#0CBACD"
#green = "#0ED9A5"
#magenta = "#D48DFC"
#red = "#EC3D63"
#white = "#F0F1F1"
#yellow = "#FEF937"
#
#[colors.normal]
#black = "#000000"
#blue = "#5891F8"
#cyan = "#43B9FC"
#green = "#3BBE89"
#magenta = "#CE78F3"
#red = "#E64B6A"
#white = "#BFBFBF"
#yellow = "#FD7B31"
#
#[colors.primary]
#background = "#1E1E1E"
#foreground = "#FFFFFF"

[colors.search.matches]
background = "#E3E3E3"
foreground = "#000000"

[font]
size = 15.0
#size = 26.0

[font.normal]
#family = "BlexMono Nerd Font"
family = "AnonymicePro Nerd Font Mono"
style = "Bold"

[window]
decorations = "buttonless"
dynamic_title = true
title = "Terminal"
opacity = 0.96
blur = true

[window.dimensions]
columns = 81
lines = 25

[window.padding]
x = 0
y = 0

[shell]
program = "/opt/homebrew/bin/tmux"
#args = ["-f /Users/brendanshephard/.tmux.conf"]
